<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - PRIME SET STRIPS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'neon': '#CCFF00' },
                    fontFamily: {
                        'heading': ['Montserrat', 'sans-serif'],
                        'body': ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; }
        h1,h2,h3 { font-family: 'Montserrat', sans-serif; }
        .glow-btn { transition: all 0.3s ease; }
        .glow-btn:hover { box-shadow: 0 0 25px rgba(204,255,0,0.5), 0 0 50px rgba(204,255,0,0.2); transform: translateY(-2px); }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center px-4">
    <div class="absolute inset-0 bg-gradient-to-b from-black via-black to-zinc-950"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] bg-neon/5 rounded-full blur-[120px]"></div>

    <div class="text-center max-w-lg relative z-10">
        <!-- Checkmark Icon -->
        <div class="w-24 h-24 bg-neon/10 border-2 border-neon/30 rounded-full flex items-center justify-center mx-auto mb-8">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#CCFF00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>

        <!-- Main Message -->
        <h1 class="font-heading font-black text-3xl sm:text-4xl lg:text-5xl uppercase mb-6 leading-tight">
            THANK YOU FOR<br>YOUR <span class="text-neon" style="text-shadow:0 0 30px rgba(204,255,0,0.3)">ORDER!</span>
        </h1>

        <!-- Secondary Text -->
        <p class="text-gray-400 text-base sm:text-lg leading-relaxed mb-10 max-w-md mx-auto">
            Our team is preparing your PRIME SET strips. You will receive an email with your tracking number as soon as it ships (3-5 business days).
        </p>

        <!-- Back to Home Button -->
        <a href="index.html" class="glow-btn inline-flex items-center gap-2 bg-neon text-black font-heading font-bold text-sm uppercase tracking-wider px-8 py-4 rounded-xl">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
            Back to Home
        </a>

        <!-- Support -->
        <p class="text-gray-600 text-xs mt-10">
            Questions? Reach us at <a href="mailto:support@primesetstrips.me" class="text-gray-400 hover:text-neon transition-colors">support@primesetstrips.me</a>
        </p>
    </div>
</body>
</html>
